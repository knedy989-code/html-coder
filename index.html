<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Sandbox & Direct Viewer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: #2d2d2d;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #3c3c3c;
        }

        h1 {
            font-size: 1.2rem;
            color: #4fc1ff;
        }

        button {
            background-color: #47a247;
            color: white;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #5cb85c;
        }

        .app-container {
            display: flex;
            flex: 1;
            width: 100%;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .panel-title {
            background-color: #252526;
            padding: 6px 12px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaaaaa;
            border-bottom: 1px solid #3c3c3c;
        }

        textarea {
            width: 100%;
            flex: 1;
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            padding: 15px;
            border: none;
            resize: none;
            outline: none;
            line-height: 1.5;
        }

        iframe {
            width: 100%;
            flex: 1;
            background-color: white;
            border: none;
        }

        .divider {
            width: 4px;
            background-color: #3c3c3c;
        }

        /* Modal for Link Generation */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .modal-content {
            background-color: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            border: 1px solid #555;
        }

        .modal-content h3 {
            margin-bottom: 15px;
            color: #4fc1ff;
        }

        .link-input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        #generated-link {
            flex: 1;
            padding: 8px;
            background: #1e1e1e;
            border: 1px solid #555;
            color: #fff;
            border-radius: 4px;
        }

        .close-modal {
            background-color: #555;
            float: right;
        }

        /* Fullscreen view-only styling */
        body.view-mode header, 
        body.view-mode .panel:nth-child(1), 
        body.view-mode .divider {
            display: none !important;
        }
    </style>
</head>
<body>

    <header id="editor-header">
        <h1>⚡ HTML Sandbox</h1>
        <button onclick="generateCleanLink()">🚀 Generate Website Link</button>
    </header>

    <div class="app-container">
        <div class="panel">
            <div class="panel-title">HTML Code</div>
            <textarea id="html-code" placeholder="Type your HTML here..." oninput="updatePreview()"><!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            padding-top: 100px;
            height: 100vh;
            margin: 0;
        }
        h1 { font-size: 3.5rem; }
    </style>
</head>
<body>
    <h1>Fixed & Working! 🎉</h1>
    <p>This is your standalone webpage preview running smoothly.</p>
</body>
</html></textarea>
        </div>

        <div class="divider"></div>

        <div class="panel">
            <div id="preview-header-title" class="panel-title">Live Preview</div>
            <iframe id="preview-window"></iframe>
        </div>
    </div>

    <div id="link-modal" class="modal">
        <div class="modal-content">
            <h3>Your Link is Ready!</h3>
            <p style="font-size: 0.85rem; color: #aaa; margin-bottom: 10px;">This link will open your code directly in full screen view:</p>
            <div class="link-input-container">
                <input type="text" id="generated-link" readonly>
                <button onclick="copyLink()">Copy</button>
            </div>
            <button class="close-modal" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        const codeInput = document.getElementById('html-code');
        const previewWindow = document.getElementById('preview-window');

        function updatePreview() {
            const code = codeInput.value;
            const previewDoc = previewWindow.contentDocument || previewWindow.contentWindow.document;
            previewDoc.open();
            previewDoc.write(code);
            previewDoc.close();
        }

        function generateCleanLink() {
            const code = codeInput.value;
            
            // We use a safe URL fragment identifier (#) which servers ignore, stopping security blocks
            const encryptedCode = btoa(unescape(encodeURIComponent(code)));
            let currentUrl = window.location.href.split('#')[0];
            
            // Forces the keyword 'view' right into the hash fragment safely
            const cleanUrl = currentUrl + '#view=' + encryptedCode;
            
            document.getElementById('generated-link').value = cleanUrl;
            document.getElementById('link-modal').style.display = 'flex';
        }

        function copyLink() {
            const linkInput = document.getElementById('generated-link');
            linkInput.select();
            linkInput.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(linkInput.value);
            alert("Link copied! Paste this in a new tab to see your creation fullscreen.");
        }

        function closeModal() {
            document.getElementById('link-modal').style.display = 'none';
        }

        // Run checking operations safely on load
        window.onload = function() {
            const hashData = window.location.hash.substring(1);

            // Checks if the link has our custom hash view command
            if (hashData.startsWith('view=')) {
                const pureCodeHash = hashData.replace('view=', '');
                try {
                    const decodedCode = decodeURIComponent(escape(atob(pureCodeHash)));
                    codeInput.value = decodedCode;
                    
                    // Trigger fullscreen mode layout
                    document.body.classList.add('view-mode');
                    document.getElementById('preview-header-title').style.display = 'none';
                } catch (e) {
                    console.error("Link parsing failed.");
                }
            }

            updatePreview();
        }
    </script>
</body>
</html>
