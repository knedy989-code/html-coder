<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Code Editor & Standalone Exporter</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: #2d2d2d;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #3c3c3c;
        }

        h1 {
            font-size: 1.2rem;
            color: #4fc1ff;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        button {
            background-color: #0e639c;
            color: white;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #1177bb;
        }

        #share-btn {
            background-color: #e51c23;
        }

        #share-btn:hover {
            background-color: #ff333a;
        }

        .app-container {
            display: flex;
            flex: 1;
            width: 100%;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .panel-title {
            background-color: #252526;
            padding: 6px 12px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaaaaa;
            border-bottom: 1px solid #3c3c3c;
        }

        textarea {
            width: 100%;
            flex: 1;
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            padding: 15px;
            border: none;
            resize: none;
            outline: none;
            line-height: 1.5;
        }

        iframe {
            width: 100%;
            flex: 1;
            background-color: white;
            border: none;
        }

        .divider {
            width: 4px;
            background-color: #3c3c3c;
        }

        /* Modal for Link Generation */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .modal-content {
            background-color: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            border: 1px solid #555;
        }

        .modal-content h3 {
            margin-bottom: 15px;
            color: #ff333a;
        }

        .link-input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        #generated-link {
            flex: 1;
            padding: 8px;
            background: #1e1e1e;
            border: 1px solid #555;
            color: #fff;
            border-radius: 4px;
        }

        .close-modal {
            background-color: #555;
            float: right;
        }
    </style>
</head>
<body>

    <header>
        <h1>⚡ HTML Sandbox</h1>
        <div class="actions">
            <button id="share-btn" onclick="generateDirectLink()">🚀 Live Website Link</button>
        </div>
    </header>

    <div class="app-container">
        <div class="panel">
            <div class="panel-title">HTML Code</div>
            <textarea id="html-code" placeholder="Type your HTML here..." oninput="updatePreview()"><!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background: linear-gradient(135deg, #1d976c, #93f9b9);
            color: white;
            padding-top: 100px;
            height: 100vh;
            margin: 0;
        }
        h1 { font-size: 3.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        p { font-size: 1.2rem; }
    </style>
</head>
<body>
    <h1>It Works! 🎉</h1>
    <p>This is a direct link to your creation without the code editor.</p>
</body>
</html></textarea>
        </div>

        <div class="divider"></div>

        <div class="panel">
            <div class="panel-title">Live Preview</div>
            <iframe id="preview-window"></iframe>
        </div>
    </div>

    <div id="link-modal" class="modal">
        <div class="modal-content">
            <h3>Website Link Ready!</h3>
            <p style="font-size: 0.85rem; color: #aaa; margin-bottom: 10px;">This link opens your creation directly as an independent web page:</p>
            <div class="link-input-container">
                <input type="text" id="generated-link" readonly>
                <button onclick="copyLink()">Copy</button>
            </div>
            <button class="close-modal" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        const codeInput = document.getElementById('html-code');
        const previewWindow = document.getElementById('preview-window');

        // Live Preview Logic
        function updatePreview() {
            const code = codeInput.value;
            const previewDoc = previewWindow.contentDocument || previewWindow.contentWindow.document;
            previewDoc.open();
            previewDoc.write(code);
            previewDoc.close();
        }

        // NEW LOGIC: Generates a standalone URL that ONLY loads the creation
        function generateDirectLink() {
            const code = codeInput.value;
            
            // Creates a raw data URL with HTML content type
            const standaloneUrl = "data:text/html;charset=utf-8," + encodeURIComponent(code);
            
            document.getElementById('generated-link').value = standaloneUrl;
            document.getElementById('link-modal').style.display = 'flex';
        }

        function copyLink() {
            const linkInput = document.getElementById('generated-link');
            linkInput.select();
            linkInput.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(linkInput.value);
            alert("Direct website link copied to clipboard!");
        }

        function closeModal() {
            document.getElementById('link-modal').style.display = 'none';
        }

        // Run the preview immediately when the page loads
        window.onload = updatePreview;
    </script>
</body>
</html>
